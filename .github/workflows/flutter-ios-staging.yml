name: iOS Staging — TestFlight & Firebase

on:
  push:
    branches: [dev]

concurrency:
  group: ios-staging
  cancel-in-progress: true

jobs:
  build-and-distribute:
    name: Build & Distribute iOS Staging
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore firebase_options.dart
        run: echo "${{ secrets.FIREBASE_OPTIONS_DART }}" | base64 --decode > lib/firebase_options.dart

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - name: Import Distribution Certificate
        env:
          CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE_P12" | base64 --decode > /tmp/distribution.p12

          security create-keychain -p "cliceat-ci-build" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "cliceat-ci-build" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          security import /tmp/distribution.p12 \
            -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "cliceat-ci-build" build.keychain

      - name: Install Staging Provisioning Profile
        run: |
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_STAGING }}" | base64 --decode > /tmp/staging.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          # Get profile UUID
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i /tmp/staging.mobileprovision))
          cp /tmp/staging.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision
          echo "Installed profile UUID: $UUID"

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | tr -d ' ')
          echo "name=${VERSION}-staging" >> $GITHUB_OUTPUT

      - name: Build iOS IPA
        run: |
          flutter build ipa \
            --release \
            --flavor staging \
            --target lib/main_staging.dart \
            --export-options-plist=ios/ExportOptions-staging.plist \
            --build-number=${{ github.run_number }} \
            --build-name=${{ steps.version.outputs.name }} \
            --dart-define=ENV=staging \
            --dart-define=API_BASE_URL=${{ secrets.STAGING_API_URL }}/api/v1

      - name: Find IPA
        id: find-ipa
        run: |
          IPA=$(find build/ios/ipa -name "*.ipa" | head -1)
          echo "path=$IPA" >> $GITHUB_OUTPUT
          echo "Found IPA: $IPA"

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: ${{ steps.find-ipa.outputs.path }}
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ secrets.ASC_PRIVATE_KEY }}

      - name: Upload to Firebase (iOS)
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_IOS_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: internal-testers
          releaseNotes: "iOS Staging #${{ github.run_number }} — ${{ github.event.head_commit.message }}"
          file: ${{ steps.find-ipa.outputs.path }}

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: >
            {"text":"${{ job.status == 'success' && '🍎 iOS staging dispo sur TestFlight & Firebase' || '❌ iOS staging build échoué' }} — Build #${{ github.run_number }} — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Logs>"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain build.keychain 2>/dev/null || true
          rm -f /tmp/distribution.p12 /tmp/staging.mobileprovision
