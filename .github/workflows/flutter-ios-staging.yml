name: iOS Staging — TestFlight & Firebase

on:
  push:
    branches: [dev]

concurrency:
  group: ios-staging
  cancel-in-progress: true

jobs:
  build-and-distribute:
    name: Build & Distribute iOS Staging
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Slack start payload
        run: |
          jq -n \
            --arg run "${{ github.run_number }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg sha "${{ github.sha }}" \
            --arg msg "$COMMIT_MSG" \
            --arg actor "${{ github.actor }}" \
            --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{"text": ("🔄 *Build iOS Staging démarré* — Build #" + $run + "\n• *Branche :* `" + $branch + "`\n• *Commit :* `" + $sha + "`\n• *Message :* " + $msg + "\n• *Auteur :* " + $actor + "\n• <" + $url + "|Voir les logs>")}' \
            > /tmp/slack_start.json
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}

      - name: Notifier Slack — Build démarré
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload-file-path: /tmp/slack_start.json
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Set Xcode Version
        run: |
          if [ -d "/Applications/Xcode_15.4.app" ]; then
            sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
          elif [ -d "/Applications/Xcode_15.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer
          elif [ -d "/Applications/Xcode_15.0.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_15.0.1.app/Contents/Developer
          else
            echo "No specific Xcode 15 found. Using default."
          fi
          xcodebuild -version

      - name: Restore firebase_options.dart
        run: echo "${{ secrets.FIREBASE_OPTIONS_DART }}" | base64 --decode > lib/firebase_options.dart

      - name: Restore GoogleService-Info.plist
        run: echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}" | base64 --decode > ios/Runner/GoogleService-Info.plist

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - name: Import Distribution Certificate
        env:
          CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE_P12" | base64 --decode > /tmp/distribution.p12

          security create-keychain -p "cliceat-ci-build" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "cliceat-ci-build" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security list-keychains -d user -s build.keychain login.keychain

          security import /tmp/distribution.p12 \
            -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "cliceat-ci-build" build.keychain

      - name: Install Staging Provisioning Profile
        run: |
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_STAGING }}" | base64 --decode > /tmp/staging.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          # Get profile UUID
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i /tmp/staging.mobileprovision))
          cp /tmp/staging.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision
          echo "Installed profile UUID: $UUID"

      - name: Restore .env.staging
        run: |
          echo "${{ secrets.ENV_STAGING_BASE64 }}" | base64 --decode > .env.staging

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | tr -d ' ')
          echo "name=${VERSION}" >> $GITHUB_OUTPUT

      - name: Configure Manual Code Signing
        run: |
          echo "CODE_SIGN_STYLE = Manual" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY = Apple Distribution" >> ios/Flutter/Release.xcconfig
          echo "DEVELOPMENT_TEAM = 738JXF4C4C" >> ios/Flutter/Release.xcconfig
          echo "PROVISIONING_PROFILE_SPECIFIER = ClicEat Staging AdHoc" >> ios/Flutter/Release.xcconfig

      - name: Build iOS IPA
        run: |
          flutter build ipa \
            --release \
            --target lib/main_staging.dart \
            --export-options-plist=ios/ExportOptions-staging.plist \
            --build-number=${{ github.run_number }} \
            --build-name=${{ steps.version.outputs.name }} \
            --dart-define-from-file=.env.staging

      - name: Find IPA
        id: find-ipa
        run: |
          IPA=$(find build/ios/ipa -name "*.ipa" | head -1)
          echo "path=$IPA" >> $GITHUB_OUTPUT
          echo "Found IPA: $IPA"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Upload to Firebase App Distribution (iOS)
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_IOS_APP_ID }}
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_CREDENTIALS" > /tmp/firebase_credentials.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase_credentials.json
          firebase appdistribution:distribute "${{ steps.find-ipa.outputs.path }}" \
            --app "$FIREBASE_APP_ID" \
            --groups "ios-staging" \
            --release-notes "🍏 Build iOS Staging #${{ github.run_number }}\nBranche : ${{ github.ref_name }}\nCommit : ${{ github.sha }}\n${{ github.event.head_commit.message }}"

      - name: Upload dSYMs to Firebase Crashlytics
        run: |
          UPLOAD_SYMBOLS=$(find ios/Pods -name "upload-symbols" | head -1)
          if [ -n "$UPLOAD_SYMBOLS" ]; then
            echo "Uploading dSYMs..."
            $UPLOAD_SYMBOLS -gsp ios/Runner/GoogleService-Info.plist -p ios build/ios/archive/Runner.xcarchive/dSYMs
          else
            echo "Warning: upload-symbols script not found. Skipping dSYMs upload to Crashlytics."
          fi

      - name: Upload Files to Slack (IPA & dSYMs)
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          if [ -n "$SLACK_BOT_TOKEN" ] && [ -n "$SLACK_CHANNEL_ID" ]; then
            node .github/scripts/upload_to_slack.js \
              "${{ steps.find-ipa.outputs.path }}" \
              "🍏 iOS Staging — IPA Build #${{ github.run_number }} (commit: ${{ github.sha }})"

            echo "Zipping and uploading dSYMs..."
            zip -r build/ios/ipa/dsyms.zip build/ios/archive/Runner.xcarchive/dSYMs
            node .github/scripts/upload_to_slack.js \
              build/ios/ipa/dsyms.zip \
              "🗜️ iOS Staging — Symboles dSYMs (Crashlytics) — Build #${{ github.run_number }}"
          else
            echo "Slack Bot Token or Channel ID not set. Skipping Slack files upload."
          fi

      - name: Prepare Slack result payload
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            STATUS="✅ iOS Staging disponible sur Firebase App Distribution"
          else
            STATUS="❌ iOS Staging build échoué"
          fi
          jq -n \
            --arg status "$STATUS" \
            --arg run "${{ github.run_number }}" \
            --arg sha "${{ github.sha }}" \
            --arg msg "$COMMIT_MSG" \
            --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{"text": ($status + " — Build #" + $run + " | Commit : `" + $sha + "` | " + $msg + " — <" + $url + "|Voir les logs>")}' \
            > /tmp/slack_result.json
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload-file-path: /tmp/slack_result.json
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain build.keychain 2>/dev/null || true
          rm -f /tmp/distribution.p12 /tmp/staging.mobileprovision .env.staging /tmp/firebase_credentials.json
