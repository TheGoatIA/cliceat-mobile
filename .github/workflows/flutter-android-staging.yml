name: Android Staging — Firebase App Distribution

on:
  push:
    branches: [dev]

concurrency:
  group: android-staging
  cancel-in-progress: true

jobs:
  build-and-distribute:
    name: Build & Distribute Android Staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Notifier Slack — Build démarré
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: >
            {"text":"🔄 *Build Android Staging démarré* — Build #${{ github.run_number }}\n• *Branche :* `${{ github.ref_name }}`\n• *Commit :* `${{ github.sha }}`\n• *Message :* ${{ github.event.head_commit.message }}\n• *Auteur :* ${{ github.actor }}\n• <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Voir les logs>"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Restore firebase_options.dart
        run: echo "${{ secrets.FIREBASE_OPTIONS_DART }}" | base64 --decode > lib/firebase_options.dart

      - name: Restore google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/cliceat-release.keystore

      - name: Create key.properties
        run: |
          cat > android/key.properties << 'KEYEOF'
          storeFile=cliceat-release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          KEYEOF

      - name: Restore .env.staging
        run: |
          echo "${{ secrets.ENV_STAGING_BASE64 }}" | base64 --decode > .env.staging

      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | tr -d ' ')
          echo "name=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build APK
        run: |
          flutter build apk \
            --release \
            --flavor staging \
            --target lib/main_staging.dart \
            --build-number=${{ github.run_number }} \
            --build-name=${{ steps.version.outputs.name }} \
            --dart-define-from-file=.env.staging

      - name: Find APK file
        id: find-apk
        run: |
          APK=$(find build/app/outputs/flutter-apk -name "*.apk" | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: android-staging
          releaseNotes: |
            🔧 Build Staging #${{ github.run_number }}
            Branche : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            ${{ github.event.head_commit.message }}
          file: ${{ steps.find-apk.outputs.path }}

      - name: Upload APK to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          if [ -n "$SLACK_BOT_TOKEN" ] && [ -n "$SLACK_CHANNEL_ID" ]; then
            node .github/scripts/upload_to_slack.js \
              "${{ steps.find-apk.outputs.path }}" \
              "🤖 Android Staging APK — Build #${{ github.run_number }}"
          else
            echo "Slack Bot Token or Channel ID not set. Skipping APK upload to Slack."
          fi

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: >
            {"text":"${{ job.status == 'success' && '✅ Android Staging disponible sur Firebase App Distribution' || '❌ Android Staging build échoué' }} — Build #${{ github.run_number }} | Commit : `${{ github.sha }}` | ${{ github.event.head_commit.message }} — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Voir les logs>"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Cleanup secrets
        if: always()
        run: rm -f android/app/cliceat-release.keystore android/key.properties .env.staging
