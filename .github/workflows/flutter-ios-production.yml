name: iOS Production — App Store

on:
  push:
    branches: [main]

concurrency:
  group: ios-production
  cancel-in-progress: false

jobs:
  build-and-submit:
    name: Build & Submit iOS Production
    runs-on: macos-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Notifier Slack — Build démarré
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: >
            {"text":"🔄 *Build iOS Production démarré* — Build #${{ github.run_number }}\n• *Branche :* `${{ github.ref_name }}`\n• *Commit :* `${{ github.sha }}`\n• *Message :* ${{ github.event.head_commit.message }}\n• *Auteur :* ${{ github.actor }}\n• <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Voir les logs>"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Set Xcode Version
        run: |
          if [ -d "/Applications/Xcode_15.4.app" ]; then
            sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
          elif [ -d "/Applications/Xcode_15.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer
          elif [ -d "/Applications/Xcode_15.0.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_15.0.1.app/Contents/Developer
          else
            echo "No specific Xcode 15 found. Using default."
          fi
          xcodebuild -version

      - name: Restore firebase_options.dart
        run: echo "${{ secrets.FIREBASE_OPTIONS_DART }}" | base64 --decode > lib/firebase_options.dart

      - name: Restore GoogleService-Info.plist
        run: echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}" | base64 --decode > ios/Runner/GoogleService-Info.plist

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - name: Import Distribution Certificate
        env:
          CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE_P12" | base64 --decode > /tmp/distribution.p12

          security create-keychain -p "cliceat-ci-build" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "cliceat-ci-build" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security list-keychains -d user -s build.keychain login.keychain

          security import /tmp/distribution.p12 \
            -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "cliceat-ci-build" build.keychain

      - name: Install Production Provisioning Profile
        run: |
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_PRODUCTION }}" | base64 --decode > /tmp/production.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          # Get profile UUID
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i /tmp/production.mobileprovision))
          cp /tmp/production.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision
          echo "Installed profile UUID: $UUID"

      - name: Restore .env.prod
        run: |
          echo "${{ secrets.ENV_PROD_BASE64 }}" | base64 --decode > .env.prod

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | tr -d ' ')
          echo "name=$VERSION" >> $GITHUB_OUTPUT

      - name: Configure Manual Code Signing
        run: |
          echo "CODE_SIGN_STYLE = Manual" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY = Apple Distribution" >> ios/Flutter/Release.xcconfig
          echo "DEVELOPMENT_TEAM = 738JXF4C4C" >> ios/Flutter/Release.xcconfig
          echo "PROVISIONING_PROFILE_SPECIFIER = ClicEat AppStore Production" >> ios/Flutter/Release.xcconfig

      - name: Build iOS IPA
        run: |
          flutter build ipa \
            --release \
            --target lib/main_prod.dart \
            --export-options-plist=ios/ExportOptions-production.plist \
            --build-number=${{ github.run_number }} \
            --build-name=${{ steps.version.outputs.name }} \
            --dart-define-from-file=.env.prod

      - name: Find IPA
        id: find-ipa
        run: |
          IPA=$(find build/ios/ipa -name "*.ipa" | head -1)
          echo "path=$IPA" >> $GITHUB_OUTPUT
          echo "Found IPA: $IPA"

      - name: Upload to TestFlight (App Store)
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: ${{ steps.find-ipa.outputs.path }}
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ secrets.ASC_PRIVATE_KEY }}

      - name: Upload dSYMs to Firebase Crashlytics
        run: |
          UPLOAD_SYMBOLS=$(find ios/Pods -name "upload-symbols" | head -1)
          if [ -n "$UPLOAD_SYMBOLS" ]; then
            echo "Uploading dSYMs..."
            $UPLOAD_SYMBOLS -gsp ios/Runner/GoogleService-Info.plist -p ios build/ios/archive/Runner.xcarchive/dSYMs
          else
            echo "Warning: upload-symbols script not found. Skipping dSYMs upload to Crashlytics."
          fi

      - name: Upload Files to Slack (IPA & dSYMs)
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          if [ -n "$SLACK_BOT_TOKEN" ] && [ -n "$SLACK_CHANNEL_ID" ]; then
            node .github/scripts/upload_to_slack.js \
              "${{ steps.find-ipa.outputs.path }}" \
              "🍎 iOS Production — IPA Build #${{ github.run_number }} (commit: ${{ github.sha }})"

            echo "Zipping and uploading dSYMs..."
            zip -r build/ios/ipa/dsyms.zip build/ios/archive/Runner.xcarchive/dSYMs
            node .github/scripts/upload_to_slack.js \
              build/ios/ipa/dsyms.zip \
              "🗜️ iOS Production — Symboles dSYMs (Crashlytics) — Build #${{ github.run_number }}"
          else
            echo "Slack Bot Token or Channel ID not set. Skipping Slack files upload."
          fi

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: >
            {"text":"${{ job.status == 'success' && format('✅ iOS Production v{0} soumis sur TestFlight (App Store)', steps.version.outputs.name) || '❌ iOS Production build échoué' }} — Build #${{ github.run_number }} | Commit : `${{ github.sha }}` | ${{ github.event.head_commit.message }} — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Voir les logs>"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain build.keychain 2>/dev/null || true
          rm -f /tmp/distribution.p12 /tmp/production.mobileprovision .env.prod
