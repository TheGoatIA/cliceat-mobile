name: iOS Production — App Store

on:
  push:
    branches: [main]

concurrency:
  group: ios-production
  cancel-in-progress: false

jobs:
  build-and-submit:
    name: Build & Submit iOS Production
    runs-on: macos-15
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Slack start payload
        run: |
          jq -n \
            --arg run "${{ github.run_number }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg sha "${{ github.sha }}" \
            --arg msg "$COMMIT_MSG" \
            --arg actor "${{ github.actor }}" \
            --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{"text": ("🔄 *Build iOS Production démarré* — Build #" + $run + "\n• *Branche :* `" + $branch + "`\n• *Commit :* `" + $sha + "`\n• *Message :* " + $msg + "\n• *Auteur :* " + $actor + "\n• <" + $url + "|Voir les logs>")}' \
            > /tmp/slack_start.json
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}

      - name: Notifier Slack — Build démarré
        uses: slackapi/slack-github-action@v3.0.3
        with:
          payload-file-path: /tmp/slack_start.json
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook

      - name: Set Xcode Version
        id: xcode
        run: |
          if [ -d "/Applications/Xcode_26.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer
            echo "xcode26=true" >> $GITHUB_OUTPUT
          elif [ -d "/Applications/Xcode_16.4.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
            echo "xcode26=false" >> $GITHUB_OUTPUT
          elif [ -d "/Applications/Xcode_16.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
            echo "xcode26=false" >> $GITHUB_OUTPUT
          else
            echo "Using default Xcode"
            echo "xcode26=false" >> $GITHUB_OUTPUT
          fi
          xcodebuild -version

      - name: Restore firebase_options.dart
        run: echo "${{ secrets.FIREBASE_OPTIONS_DART }}" | base64 --decode > lib/firebase_options.dart

      - name: Restore GoogleService-Info.plist
        run: echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}" | base64 --decode > ios/Runner/GoogleService-Info.plist

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - name: Import Distribution Certificate
        env:
          CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE_P12" | base64 --decode > /tmp/distribution.p12

          security create-keychain -p "cliceat-ci-build" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "cliceat-ci-build" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security list-keychains -d user -s build.keychain login.keychain

          security import /tmp/distribution.p12 \
            -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "cliceat-ci-build" build.keychain

      - name: Install Production Provisioning Profile
        run: |
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_PRODUCTION }}" | base64 --decode > /tmp/production.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i /tmp/production.mobileprovision))
          cp /tmp/production.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision
          echo "Installed profile UUID: $UUID"
          echo "Profile name: $(/usr/libexec/PlistBuddy -c 'Print Name' /dev/stdin <<< $(security cms -D -i /tmp/production.mobileprovision))"

      - name: Restore .env.prod
        run: |
          echo "${{ secrets.ENV_PROD_BASE64 }}" | base64 --decode > .env.prod

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | tr -d ' ')
          echo "name=$VERSION" >> $GITHUB_OUTPUT

      - name: Configure Manual Code Signing
        run: |
          echo "CODE_SIGN_STYLE = Manual" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY = Apple Distribution" >> ios/Flutter/Release.xcconfig
          echo "DEVELOPMENT_TEAM = 738JXF4C4C" >> ios/Flutter/Release.xcconfig
          echo "PROVISIONING_PROFILE_SPECIFIER = ClicEat Production AppStore" >> ios/Flutter/Release.xcconfig

      - name: Build iOS IPA
        run: |
          flutter build ipa \
            --release \
            --target lib/main_prod.dart \
            --export-options-plist=ios/ExportOptions-production.plist \
            --build-number=${{ github.run_number }} \
            --build-name=${{ steps.version.outputs.name }} \
            --dart-define-from-file=.env.prod

      - name: Find IPA
        id: find-ipa
        run: |
          IPA=$(find build/ios -name "*.ipa" | head -1)
          if [ -z "$IPA" ]; then
            echo "ERREUR: Aucun fichier .ipa trouvé. L'export a échoué."
            find build/ios -type f 2>/dev/null | grep -v '.o$' | head -30 || true
            exit 1
          fi
          echo "path=$IPA" >> $GITHUB_OUTPUT
          echo "IPA trouvé : $IPA"

      - name: Upload to TestFlight (App Store)
        if: steps.xcode.outputs.xcode26 == 'true'
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: ${{ steps.find-ipa.outputs.path }}
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ secrets.ASC_PRIVATE_KEY }}

      - name: TestFlight skipped — Xcode 26 non disponible
        if: steps.xcode.outputs.xcode26 == 'false'
        run: echo "⚠️ Upload TestFlight ignoré — Xcode 26 absent du runner (iOS 26 SDK requis par Apple). L'IPA est buildé mais non soumis."

      - name: Upload dSYMs to Firebase Crashlytics
        run: |
          UPLOAD_SYMBOLS=$(find ios/Pods -name "upload-symbols" | head -1)
          if [ -n "$UPLOAD_SYMBOLS" ]; then
            echo "Uploading dSYMs..."
            $UPLOAD_SYMBOLS -gsp ios/Runner/GoogleService-Info.plist -p ios build/ios/archive/Runner.xcarchive/dSYMs
          else
            echo "Warning: upload-symbols script not found. Skipping dSYMs upload to Crashlytics."
          fi

      - name: Upload Files to Slack (IPA & dSYMs)
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          if [ -n "$SLACK_BOT_TOKEN" ] && [ -n "$SLACK_CHANNEL_ID" ]; then
            node .github/scripts/upload_to_slack.js \
              "${{ steps.find-ipa.outputs.path }}" \
              "🍎 iOS Production — IPA Build #${{ github.run_number }} (commit: ${{ github.sha }})"

            echo "Zipping and uploading dSYMs..."
            zip -r build/ios/ipa/dsyms.zip build/ios/archive/Runner.xcarchive/dSYMs
            node .github/scripts/upload_to_slack.js \
              build/ios/ipa/dsyms.zip \
              "🗜️ iOS Production — Symboles dSYMs (Crashlytics) — Build #${{ github.run_number }}"
          else
            echo "Slack Bot Token or Channel ID not set. Skipping Slack files upload."
          fi

      - name: Prepare Slack result payload
        if: always()
        run: |
          VERSION="${{ steps.version.outputs.name }}"
          if [ "${{ job.status }}" = "success" ]; then
            if [ "${{ steps.xcode.outputs.xcode26 }}" = "true" ]; then
              STATUS="✅ iOS Production v${VERSION} soumis sur TestFlight"
            else
              STATUS="⚠️ iOS Production v${VERSION} buildé (TestFlight en attente de Xcode 26)"
            fi
          else
            STATUS="❌ iOS Production build échoué"
          fi
          jq -n \
            --arg status "$STATUS" \
            --arg run "${{ github.run_number }}" \
            --arg sha "${{ github.sha }}" \
            --arg msg "$COMMIT_MSG" \
            --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{"text": ($status + " — Build #" + $run + " | Commit : `" + $sha + "` | " + $msg + " — <" + $url + "|Voir les logs>")}' \
            > /tmp/slack_result.json
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v3.0.3
        with:
          payload-file-path: /tmp/slack_result.json
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain build.keychain 2>/dev/null || true
          rm -f /tmp/distribution.p12 /tmp/production.mobileprovision .env.prod
