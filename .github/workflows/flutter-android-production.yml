name: Android Production — Google Play Beta

on:
  push:
    branches: [main]

concurrency:
  group: android-production
  cancel-in-progress: false

jobs:
  build-and-publish:
    name: Build & Publish Android Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Prepare Slack start payload
        run: |
          jq -n \
            --arg run "${{ github.run_number }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg sha "${{ github.sha }}" \
            --arg msg "$COMMIT_MSG" \
            --arg actor "${{ github.actor }}" \
            --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{"text": ("🔄 *Build Android Production démarré* — Build #" + $run + "\n• *Branche :* `" + $branch + "`\n• *Commit :* `" + $sha + "`\n• *Message :* " + $msg + "\n• *Auteur :* " + $actor + "\n• <" + $url + "|Voir les logs>")}' \
            > /tmp/slack_start.json
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}

      - name: Notifier Slack — Build démarré
        uses: slackapi/slack-github-action@v3.0.3
        with:
          payload-file-path: /tmp/slack_start.json
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook

      - name: Restore firebase_options.dart
        run: echo "${{ secrets.FIREBASE_OPTIONS_DART }}" | base64 --decode > lib/firebase_options.dart

      - name: Restore google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/cliceat-release.keystore

      - name: Create key.properties
        run: |
          cat > android/key.properties << 'KEYEOF'
          storeFile=cliceat-release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          KEYEOF

      - name: Restore .env.prod
        run: |
          echo "${{ secrets.ENV_PROD_BASE64 }}" | base64 --decode > .env.prod

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | tr -d ' ')
          echo "name=$VERSION" >> $GITHUB_OUTPUT

      - name: Build App Bundle (Production)
        run: |
          flutter build appbundle \
            --release \
            --flavor prod \
            --target lib/main_prod.dart \
            --build-number=${{ github.run_number }} \
            --build-name=${{ steps.version.outputs.name }} \
            --dart-define-from-file=.env.prod

      - name: Find AAB file
        id: find-aab
        run: |
          AAB=$(find build/app/outputs/bundle -name "*.aab" | head -1)
          echo "path=$AAB" >> $GITHUB_OUTPUT

          MAPPING=$(find build/app/outputs/mapping -name "mapping.txt" 2>/dev/null | head -1 || echo "")
          echo "mapping=$MAPPING" >> $GITHUB_OUTPUT

      - name: Upload to Firebase (android-production)
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: android-production
          releaseNotes: "🚀 Build Production v${{ steps.version.outputs.name }} #${{ github.run_number }}\nBranche : ${{ github.ref_name }}\nCommit : ${{ github.sha }}\n${{ github.event.head_commit.message }}"
          file: ${{ steps.find-aab.outputs.path }}

      - name: Upload to Google Play Beta
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName: com.tbg.cliceat
          releaseFiles: ${{ steps.find-aab.outputs.path }}
          track: beta
          status: completed
          mappingFile: ${{ steps.find-aab.outputs.mapping }}
          changesNotSentForReview: false

      - name: Prepare Slack result payload
        if: always()
        run: |
          VERSION="${{ steps.version.outputs.name }}"
          if [ "${{ job.status }}" = "success" ]; then
            STATUS="✅ Android Production v${VERSION} soumis sur le Play Store (Beta)"
          else
            STATUS="❌ Android Production build échoué"
          fi
          jq -n \
            --arg status "$STATUS" \
            --arg run "${{ github.run_number }}" \
            --arg sha "${{ github.sha }}" \
            --arg msg "$COMMIT_MSG" \
            --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{"text": ($status + " — Build #" + $run + " | Commit : `" + $sha + "` | " + $msg + " — <" + $url + "|Voir les logs>")}' \
            > /tmp/slack_result.json
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v3.0.3
        with:
          payload-file-path: /tmp/slack_result.json
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook

      - name: Cleanup secrets
        if: always()
        run: rm -f android/app/cliceat-release.keystore android/key.properties .env.prod
