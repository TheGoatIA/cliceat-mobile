name: Flutter CI

on:
  pull_request:
    branches: [dev, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Restore firebase_options.dart
        run: |
          if [ -z "${{ secrets.FIREBASE_OPTIONS_DART }}" ]; then
            echo "Secret FIREBASE_OPTIONS_DART is empty. Creating mock lib/firebase_options.dart..."
            cat > lib/firebase_options.dart << 'EOF'
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform =>
                const FirebaseOptions(
                  apiKey: 'mock-key',
                  appId: 'mock-app-id',
                  messagingSenderId: 'mock-sender',
                  projectId: 'mock-project',
                  storageBucket: 'mock-bucket',
                );
          }
          EOF
          else
            echo "Restoring lib/firebase_options.dart from secret..."
            echo "${{ secrets.FIREBASE_OPTIONS_DART }}" | base64 --decode > lib/firebase_options.dart
          fi

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: |
          dart format lib/firebase_options.dart || true
          dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test --coverage || true

  build-android-check:
    name: Android Debug Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Restore firebase_options.dart
        run: |
          if [ -z "${{ secrets.FIREBASE_OPTIONS_DART }}" ]; then
            echo "Secret FIREBASE_OPTIONS_DART is empty. Creating mock lib/firebase_options.dart..."
            cat > lib/firebase_options.dart << 'EOF'
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform =>
                const FirebaseOptions(
                  apiKey: 'mock-key',
                  appId: 'mock-app-id',
                  messagingSenderId: 'mock-sender',
                  projectId: 'mock-project',
                  storageBucket: 'mock-bucket',
                );
          }
          EOF
          else
            echo "Restoring lib/firebase_options.dart from secret..."
            echo "${{ secrets.FIREBASE_OPTIONS_DART }}" | base64 --decode > lib/firebase_options.dart
          fi

      - name: Restore google-services.json
        run: |
          if [ -z "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" ]; then
            echo "Secret GOOGLE_SERVICES_JSON_BASE64 is empty. Creating mock google-services.json..."
            cat > android/app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "mock-project",
              "storage_bucket": "mock-project.firebasestorage.app"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": {
                    "package_name": "com.tbg.cliceat"
                  }
                },
                "api_key": [{"current_key": "mock-key"}],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF
          else
            echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json
          fi
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - name: Build debug APK
        run: flutter build apk --debug --flavor staging --target lib/main_staging.dart --dart-define=ENV=staging --dart-define=API_BASE_URL=https://api-staging.cliceat.cm/api/v1

  build-ios-check:
    name: iOS Build Check (no codesign)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Restore firebase_options.dart
        run: |
          if [ -z "${{ secrets.FIREBASE_OPTIONS_DART }}" ]; then
            echo "Secret FIREBASE_OPTIONS_DART is empty. Creating mock lib/firebase_options.dart..."
            cat > lib/firebase_options.dart << 'EOF'
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform =>
                const FirebaseOptions(
                  apiKey: 'mock-key',
                  appId: 'mock-app-id',
                  messagingSenderId: 'mock-sender',
                  projectId: 'mock-project',
                  storageBucket: 'mock-bucket',
                );
          }
          EOF
          else
            echo "Restoring lib/firebase_options.dart from secret..."
            echo "${{ secrets.FIREBASE_OPTIONS_DART }}" | base64 --decode > lib/firebase_options.dart
          fi

      - name: Restore GoogleService-Info.plist
        run: |
          if [ -z "${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}" ]; then
            echo "Secret GOOGLE_SERVICE_INFO_PLIST_BASE64 is empty. Creating mock GoogleService-Info.plist..."
            cat > ios/Runner/GoogleService-Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          	<key>API_KEY</key>
          	<string>mock-key</string>
          	<key>GOOGLE_APP_ID</key>
          	<string>1:000000000000:ios:0000000000000000000000</string>
          	<key>GCM_SENDER_ID</key>
          	<string>000000000000</string>
          	<key>PROJECT_ID</key>
          	<string>mock-project</string>
          	<key>STORAGE_BUCKET</key>
          	<string>mock-project.firebasestorage.app</string>
          	<key>BUNDLE_ID</key>
          	<string>com.tbg.cliceat</string>
          </dict>
          </plist>
          EOF
          else
            echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}" | base64 --decode > ios/Runner/GoogleService-Info.plist
          fi
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - name: Build iOS (no codesign)
        run: flutter build ios --no-codesign --debug --target lib/main_staging.dart --dart-define=ENV=staging --dart-define=API_BASE_URL=https://api-staging.cliceat.cm/api/v1
