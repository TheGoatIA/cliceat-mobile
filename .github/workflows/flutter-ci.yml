name: Flutter CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test --coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  build-android:
    runs-on: ubuntu-latest
    needs: analyze-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable

      # Décoder le keystore depuis les secrets GitHub
      - name: Setup keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/cliceat-release.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=cliceat
          storeFile=cliceat-release.jks
          EOF

      # Injecter google-services.json depuis les secrets
      - name: Inject google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > android/app/google-services.json

      - run: |
          flutter build appbundle \
            --flavor prod \
            -t lib/main_prod.dart \
            --dart-define=APP_ENV=prod \
            --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }} \
            --dart-define=WS_URL=${{ secrets.WS_URL }} \
            --dart-define=SSL_FINGERPRINT=${{ secrets.SSL_FINGERPRINT }} \
            --dart-define=MAPBOX_ACCESS_TOKEN=${{ secrets.MAPBOX_TOKEN }} \
            --dart-define=NOTCHPAY_PUBLIC_KEY=${{ secrets.NOTCHPAY_PUBLIC_KEY }}

      - uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/prodRelease/

  build-ios:
    runs-on: macos-latest
    needs: analyze-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          
      - name: Inject GoogleService-Info.plist
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 -d \
            > ios/Runner/GoogleService-Info.plist

      - name: Install pods
        run: cd ios && pod install
        
      - run: |
          flutter build ipa \
            --flavor prod \
            -t lib/main_prod.dart \
            --dart-define=APP_ENV=prod \
            --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }} \
            --dart-define=WS_URL=${{ secrets.WS_URL }} \
            --dart-define=SSL_FINGERPRINT=${{ secrets.SSL_FINGERPRINT }} \
            --dart-define=MAPBOX_ACCESS_TOKEN=${{ secrets.MAPBOX_TOKEN }} \
            --dart-define=NOTCHPAY_PUBLIC_KEY=${{ secrets.NOTCHPAY_PUBLIC_KEY }} \
            --export-options-plist=ios/ExportOptions.plist

      - uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: build/ios/ipa/*.ipa
